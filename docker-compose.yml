version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: banco-malvader-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banco_malvader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - banco-net

  adminer:
    image: adminer
    container_name: banco-malvader-adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - banco-net

volumes:
  postgres_data:

networks:
  banco-net: