<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Banco Malvader</title>
    <link rel="icon" type="image/x-icon" href="/images/Logo Amarelo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- CONTENT -->
    <div class="account-page-center">
        <main class="account-card">
            <!-- Account Header -->
            <div class="account-header">
                <h2 id="welcomeName">Minha Conta</h2>
                <p>Gerencie seus dados e segurança</p>
            </div>

            <!-- Personal Info Section -->
            <section class="account-section">
                <h3 class="account-section-title">Dados Pessoais</h3>
                
                <div class="info-group">
                    <label for="nome">Nome Completo</label>
                    <div class="info-value-container">
                        <input type="text" id="nome" readonly class="info-value-input">
                    </div>
                </div>

                <div class="info-group">
                    <label for="cpf">CPF</label>
                    <div class="info-value-container">
                        <input type="text" id="cpf" readonly class="info-value-input">
                    </div>
                </div>

                <div class="info-group">
                    <label for="email">E-mail</label>
                    <div class="info-value-container">
                        <input type="email" id="email" readonly class="info-value-input">
                    </div>
                </div>
            </section>

            <!-- Change Password Section -->
            <section class="account-section">
                <h3 class="account-section-title">Alterar Senha</h3>
                
                <form id="changePasswordForm" class="password-form">
                    <div class="form-group">
                        <label for="senhaAtual">Senha Atual</label>
                        <input type="password" id="senhaAtual" name="senhaAtual" placeholder="Digite sua senha atual" required>
                    </div>

                    <div class="form-group">
                        <label for="novaSenha">Nova Senha</label>
                        <input type="password" id="novaSenha" name="novaSenha" placeholder="Digite a nova senha" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmarNovaSenha">Confirmar Nova Senha</label>
                        <input type="password" id="confirmarNovaSenha" name="confirmarNovaSenha" placeholder="Confirme a nova senha" required>
                    </div>

                    <button type="submit" class="btn-change-password" id="btnSalvarSenha">Atualizar Senha</button>
                </form>
            </section>

            <!-- Footer Actions -->
            <div class="account-footer">
                <a href="/" class="btn-home" id="btnGoHome">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    Voltar para Home
                </a>
                
                <button type="button" class="btn-logout" id="btnLogout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" x2="9" y1="12" y2="12"/>
                    </svg>
                    Sair da Conta
                </button>
            </div>

        </main>
    </div>

    <script src="js/account.js"></script>
</body>
</html>
